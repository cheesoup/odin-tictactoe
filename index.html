<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>HTML Boilerplate</title>
		<link rel="stylesheet" href="style.css">
		<script src="script.js" defer></script>
	</head>
	<body class="bg-black">
		<div class="main-container">
			<div class="player">
				<div class="player-info">
					<p class="name">Player X</p>
					<p class="wins">0</p>
					<svg class="mark" width="50px" height="50px">
						<line x1="0%" y1="0%" x2="100%" y2="100%"/>
						<line x1="100%" y1="0%" x2="0%" y2="100%"/>
					</svg>
				</div>
				<svg class="arrow" width="50px" height="50px" data-your-turn="false">
					<line x1="50%" y1="0%" x2="50%" y2="100%"/>
					<line x1="50%" y1="0%" x2="20%" y2="50%"/>
					<line x1="50%" y1="0%" x2="80%" y2="50%"/>
				</svg>
			</div>
			<div id="game" data-game-status="0">
					<svg width="100%" height="100%" data-x="0" data-y="0" data-mark="undefined">
						<line x1="20%" y1="20%"x2="80%" y2="80%"/>
						<line x1="80%" y1="20%" x2="20%" y2="80%"/>
						<circle r="35%" cx="50%" cy="50%" fill="transparent"/>
					</svg>
					<svg width="100%" height="100%" data-x="1" data-y="0" data-mark="undefined">
						<line x1="20%" y1="20%"x2="80%" y2="80%"/>
						<line x1="80%" y1="20%" x2="20%" y2="80%"/>
						<circle r="35%" cx="50%" cy="50%" fill="transparent"/>
					</svg>
					<svg width="100%" height="100%" data-x="2" data-y="0" data-mark="undefined">
						<line x1="20%" y1="20%"x2="80%" y2="80%"/>
						<line x1="80%" y1="20%" x2="20%" y2="80%"/>
						<circle r="35%" cx="50%" cy="50%" fill="transparent"/>
					</svg>
					<svg width="100%" height="100%" data-x="0" data-y="1" data-mark="undefined">
						<line x1="20%" y1="20%"x2="80%" y2="80%"/>
						<line x1="80%" y1="20%" x2="20%" y2="80%"/>
						<circle r="35%" cx="50%" cy="50%" fill="transparent"/>
					</svg>
					<svg width="100%" height="100%" data-x="1" data-y="1" data-mark="undefined">
						<line x1="20%" y1="20%"x2="80%" y2="80%"/>
						<line x1="80%" y1="20%" x2="20%" y2="80%"/>
						<circle r="35%" cx="50%" cy="50%" fill="transparent"/>
					</svg>
					<svg width="100%" height="100%" data-x="2" data-y="1" data-mark="undefined">
						<line x1="20%" y1="20%"x2="80%" y2="80%"/>
						<line x1="80%" y1="20%" x2="20%" y2="80%"/>
						<circle r="35%" cx="50%" cy="50%" fill="transparent"/>
					</svg>
					<svg width="100%" height="100%" data-x="0" data-y="2" data-mark="undefined">
						<line x1="20%" y1="20%"x2="80%" y2="80%"/>
						<line x1="80%" y1="20%" x2="20%" y2="80%"/>
						<circle r="35%" cx="50%" cy="50%" fill="transparent"/>
					</svg>
					<svg width="100%" height="100%" data-x="1" data-y="2" data-mark="undefined">
						<line x1="20%" y1="20%"x2="80%" y2="80%"/>
						<line x1="80%" y1="20%" x2="20%" y2="80%"/>
						<circle r="35%" cx="50%" cy="50%" fill="transparent"/>
					</svg>
					<svg width="100%" height="100%" data-x="2" data-y="2" data-mark="undefined">
						<line x1="20%" y1="20%"x2="80%" y2="80%"/>
						<line x1="80%" y1="20%" x2="20%" y2="80%"/>
						<circle r="35%" cx="50%" cy="50%" fill="transparent"/>
					</svg>
			</div>
			<div class="player">
				<div class="player-info">
					<p class="name">Player O</p>
					<p class="wins">0</p>
					<svg class="mark" width="50px" height="50px">
						<circle r="47%" cx="50%" cy="50%" fill="transparent"/>
					</svg>
				</div>
				<svg class="arrow" width="50px" height="50px" data-your-turn="false">
					<line x1="50%" y1="0%" x2="50%" y2="100%"/>
					<line x1="50%" y1="0%" x2="20%" y2="50%"/>
					<line x1="50%" y1="0%" x2="80%" y2="50%"/>
				</svg>
			</div>
		</div>
		<div class="options">
			<button popovertarget="options">Set Names</button>
			<button>Reset</button>
		</div>
		<dialog id="options" popover>
			<form>
				<label for="p0">Player X's name:</label>
				<input id="p0" name="p0" type="text" minlength="1" />
	
				<label for="p1">Player O's name:</label>
				<input id="p1" name="p1" type="text" minlength="1" />
	
				<input type="submit" value="Ok" />
			</form>
		</div>
	</body>
</html>
