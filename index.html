<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Tic Tac Toe</title>
		<link rel="stylesheet" href="style.css">
		<script src="script.js" defer></script>
	</head>
	<body class="flex jc ac">
		<div class="flex je container">
			<div class="player flex col jb ac gap50">
				<div class="flex col jb ac gap50">
					<p class="name">Player X</p>
					<p class="wins">0</p>
					<svg class="player-symbol" width="50px" height="50px">
						<line x1="0%" y1="0%" x2="100%" y2="100%"/>
						<line x1="100%" y1="0%" x2="0%" y2="100%"/>
					</svg>
				</div>
				<svg class="turn-marker" width="50px" height="50px" data-your-turn="false">
					<line x1="50%" y1="0%" x2="50%" y2="100%"/>
					<line x1="50%" y1="0%" x2="20%" y2="50%"/>
					<line x1="50%" y1="0%" x2="80%" y2="50%"/>
				</svg>
			</div>
			<div class="grid" data-game-status="0">
				<svg width="100%" height="100%" data-x="0" data-y="0" data-mark="undefined">
					<line x1="20%" y1="20%"x2="80%" y2="80%"/>
					<line x1="80%" y1="20%" x2="20%" y2="80%"/>
					<circle r="35%" cx="50%" cy="50%"/>
				</svg>
				<svg width="100%" height="100%" data-x="1" data-y="0" data-mark="undefined">
					<line x1="20%" y1="20%"x2="80%" y2="80%"/>
					<line x1="80%" y1="20%" x2="20%" y2="80%"/>
					<circle r="35%" cx="50%" cy="50%"/>
				</svg>
				<svg width="100%" height="100%" data-x="2" data-y="0" data-mark="undefined">
					<line x1="20%" y1="20%"x2="80%" y2="80%"/>
					<line x1="80%" y1="20%" x2="20%" y2="80%"/>
					<circle r="35%" cx="50%" cy="50%"/>
				</svg>
				<svg width="100%" height="100%" data-x="0" data-y="1" data-mark="undefined">
					<line x1="20%" y1="20%"x2="80%" y2="80%"/>
					<line x1="80%" y1="20%" x2="20%" y2="80%"/>
					<circle r="35%" cx="50%" cy="50%"/>
				</svg>
				<svg width="100%" height="100%" data-x="1" data-y="1" data-mark="undefined">
					<line x1="20%" y1="20%"x2="80%" y2="80%"/>
					<line x1="80%" y1="20%" x2="20%" y2="80%"/>
					<circle r="35%" cx="50%" cy="50%"/>
				</svg>
				<svg width="100%" height="100%" data-x="2" data-y="1" data-mark="undefined">
					<line x1="20%" y1="20%"x2="80%" y2="80%"/>
					<line x1="80%" y1="20%" x2="20%" y2="80%"/>
					<circle r="35%" cx="50%" cy="50%"/>
				</svg>
				<svg width="100%" height="100%" data-x="0" data-y="2" data-mark="undefined">
					<line x1="20%" y1="20%"x2="80%" y2="80%"/>
					<line x1="80%" y1="20%" x2="20%" y2="80%"/>
					<circle r="35%" cx="50%" cy="50%"/>
				</svg>
				<svg width="100%" height="100%" data-x="1" data-y="2" data-mark="undefined">
					<line x1="20%" y1="20%"x2="80%" y2="80%"/>
					<line x1="80%" y1="20%" x2="20%" y2="80%"/>
					<circle r="35%" cx="50%" cy="50%"/>
				</svg>
				<svg width="100%" height="100%" data-x="2" data-y="2" data-mark="undefined">
					<line x1="20%" y1="20%"x2="80%" y2="80%"/>
					<line x1="80%" y1="20%" x2="20%" y2="80%"/>
					<circle r="35%" cx="50%" cy="50%"/>
				</svg>
			</div>
			<div class="player flex col jb ac gap50">
				<div class="flex col jb ac gap50">
					<p class="name">Player O</p>
					<p class="wins">0</p>
					<svg class="player-symbol" width="50px" height="50px">
						<circle r="47%" cx="50%" cy="50%"/>
					</svg>
				</div>
				<svg class="turn-marker" width="50px" height="50px" data-your-turn="false">
					<line x1="50%" y1="0%" x2="50%" y2="100%"/>
					<line x1="50%" y1="0%" x2="20%" y2="50%"/>
					<line x1="50%" y1="0%" x2="80%" y2="50%"/>
				</svg>
			</div>
		</div>

		<div class="options">
			<button class="bdr1" popovertarget="namer">Set Names</button>
			<button class="bdr1 reset">Reset</button>
		</div>

		<dialog id="name-dialog" class="bdr1" popover>
			<form class="flex col gap10">
				<label for="p0">Player X's name:</label>
				<input id="p0" name="p0" type="text" minlength="1" class="bdr1"/>
				<label for="p1">Player O's name:</label>
				<input id="p1" name="p1" type="text" minlength="1" class="bdr1"/>
				<input type="submit" value="Ok" class="bdr1"/>
			</form>
		</dialog>
	</body>
</html>
